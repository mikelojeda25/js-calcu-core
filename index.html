<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://res.cloudinary.com/dd5gbzoti/image/upload/v1775046995/calculator_logo_el56hl.png"
    />
    <title>Calculator - Number to Words Conversion</title>
  </head>
  <body>
    <section>
      <div class="calculator">
        <input type="text" id="display" />

        <div class="button">
          <button onclick="appendToDisplay('7')">7</button>
          <button onclick="appendToDisplay('8')">8</button>
          <button onclick="appendToDisplay('9')">9</button>
          <button onclick="clearToDisplay()">C</button>
          <button onclick="calculate()">=</button>
        </div>
      </div>
    </section>
  </body>
</html>
